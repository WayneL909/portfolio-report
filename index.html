<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資績效報告</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8; --white: #ffffff; --ink: #111111; --ink2: #444444;
  --ink3: #999999; --line: #E8E8E4; --red: #C8000A; --green: #006E35;
  --gold: #8A6820; --gold-bg: #F5F0E8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: -apple-system,'SF Pro TC','SF Pro Text','Helvetica Neue',sans-serif; font-weight: 300; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.page { max-width: 640px; margin: 0 auto; padding: 0 28px 100px; }
.loading { text-align: center; padding: 120px 0; font-family: 'DM Mono',monospace; font-size: 12px; color: var(--ink3); letter-spacing: 0.2em; }
.header { padding: 56px 0 40px; border-bottom: 1px solid var(--ink); margin-bottom: 48px; }
.header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
.header-tag { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.header-date { font-family: 'DM Mono',monospace; font-size: 11px; color: var(--ink3); }
.header-title { font-size: clamp(32px,8vw,52px); font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; }
.header-title span { color: var(--gold); font-weight: 300; }
.hero { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line); margin-bottom: 56px; background: var(--white); }
.hero-item { padding: 24px 22px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.hero-item:nth-child(2) { border-right: none; }
.hero-item:nth-child(3) { border-bottom: none; }
.hero-item:nth-child(4) { border-right: none; border-bottom: none; }
.hero-item.featured { background: var(--gold-bg); }
.hero-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); font-weight: 500; margin-bottom: 10px; line-height: 1.6; }
.hero-value { font-family: 'DM Mono',monospace; font-size: clamp(18px,4vw,26px); font-weight: 500; line-height: 1; }
.hero-sub { font-size: 10px; color: var(--ink3); margin-top: 8px; font-family: 'DM Mono',monospace; }
.section { margin-bottom: 48px; }
.section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; padding-bottom: 14px; border-bottom: 1px solid var(--ink); margin-bottom: 0; }
.row { display: flex; justify-content: space-between; align-items: baseline; padding: 16px 0; border-bottom: 1px solid var(--line); }
.row-label { font-size: 13px; color: var(--ink2); font-weight: 400; flex: 1; }
.row-value { font-family: 'DM Mono',monospace; font-size: 15px; font-weight: 500; color: var(--ink); text-align: right; }
.period-table { width: 100%; border-collapse: collapse; }
.period-table th { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); font-weight: 500; padding: 12px 0; border-bottom: 1px solid var(--line); text-align: left; }
.period-table th:not(:first-child) { text-align: right; }
.period-table td { padding: 16px 0; border-bottom: 1px solid var(--line); }
.period-table td:not(:first-child) { text-align: right; }
.period-table tr:last-child td { border-bottom: none; }
.period-date { font-family: 'DM Mono',monospace; font-size: 11px; color: var(--ink3); line-height: 1.7; }
.period-num { font-family: 'DM Mono',monospace; font-size: 15px; font-weight: 500; }
.total-row td { background: var(--ink); padding: 14px 10px; border-bottom: none; }
.total-row td:first-child { padding-left: 14px; }
.total-row td:last-child { padding-right: 14px; }
.total-label { font-family: 'DM Mono',monospace; font-size: 11px; color: #aaa; }
.total-rate { font-family: 'DM Mono',monospace; font-size: 16px; font-weight: 500; }
.footer { padding-top: 40px; border-top: 1px solid var(--line); }
.footer-text { font-size: 11px; color: var(--ink3); line-height: 2.2; font-family: 'DM Mono',monospace; }
.error-box { text-align: center; padding: 80px 0; }
.error-box p { font-family: 'DM Mono',monospace; font-size: 12px; color: var(--red); margin-bottom: 16px; }
.retry-btn { background: var(--ink); color: var(--white); border: none; padding: 10px 24px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="page">
  <div id="loading" class="loading">載入資料中…</div>
  <div id="error-box" class="error-box" style="display:none">
    <p id="error-msg">資料載入失敗</p>
    <button class="retry-btn" onclick="loadData()">重新載入</button>
  </div>
  <div id="main" style="display:none">
    <div class="header">
      <div class="header-meta">
        <span class="header-tag">投資績效報告</span>
        <span class="header-date" id="d-date"></span>
      </div>
      <h1 class="header-title">績效<br><span>總覽</span></h1>
    </div>
    <div class="hero">
      <div class="hero-item featured">
        <div class="hero-label">時間加權累積報酬率 TWR</div>
        <div class="hero-value" id="d-twr"></div>
        <div class="hero-sub" id="d-twr-sub"></div>
      </div>
      <div class="hero-item featured">
        <div class="hero-label">推估年化報酬率（單利）</div>
        <div class="hero-value" id="d-ann" style="color:#C8000A"></div>
        <div class="hero-sub">TWR 基礎換算</div>
      </div>
      <div class="hero-item">
        <div class="hero-label">累積總獲利（帳戶）</div>
        <div class="hero-value" id="d-profit" style="color:#C8000A"></div>
        <div class="hero-sub">期末 — 累計投入</div>
      </div>
      <div class="hero-item">
        <div class="hero-label">期末總資金</div>
        <div class="hero-value" id="d-balance"></div>
        <div class="hero-sub" id="d-bal-date"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">帳戶摘要</div>
      <div class="row"><span class="row-label">總投資天數</span><span class="row-value" id="s-days"></span></div>
      <div class="row"><span class="row-label">初始投入本金</span><span class="row-value" id="s-init"></span></div>
      <div class="row"><span class="row-label">新增投入本金</span><span class="row-value" id="s-add"></span></div>
      <div class="row"><span class="row-label">累計投入本金</span><span class="row-value" id="s-total"></span></div>
      <div class="row"><span class="row-label" id="s-end-label">期末總資金</span><span class="row-value" id="s-balance"></span></div>
      <div class="row"><span class="row-label">累積總獲利（帳戶）</span><span class="row-value" id="s-profit" style="color:#C8000A"></span></div>
      <div class="row"><span class="row-label">時間加權累積報酬率（TWR）</span><span class="row-value" id="s-twr"></span></div>
      <div class="row" style="border-bottom:none"><span class="row-label">推估年化報酬率（TWR・單利）</span><span class="row-value" id="s-ann" style="color:#C8000A"></span></div>
    </div>
    <div class="section">
      <div class="section-title">各期間績效</div>
      <table class="period-table">
        <thead><tr><th>區間</th><th>該段獲利</th><th>報酬率</th></tr></thead>
        <tbody id="periods-body"></tbody>
      </table>
    </div>
    <div class="footer">
      <div class="footer-text">本報告數據由代操方提供・僅供參考<br>報告日期：<span id="d-footer-date"></span></div>
    </div>
  </div>
</div>

<script>
var WORKER_URL = "https://sheets-proxy.jt9wn5m458.workers.dev";
var _timer = null;

function isNeg(v) { return String(v).trim().charAt(0) === "-"; }
function numColor(v) { return isNeg(v) ? "#006E35" : "#C8000A"; }
function addPlus(v) {
  var s = String(v).trim();
  if (!s) return s;
  if (s.charAt(0) !== "-" && s.charAt(0) !== "+") return "+" + s;
  return s;
}
function setText(id, val) { var el=document.getElementById(id); if(el) el.textContent=String(val); }

function parseCSV(text) {
  var rows = [];
  text.replace(/\r/g,"").split("\n").forEach(function(line) {
    if (!line.trim()) return;
    var cols=[]; var cur=""; var inQ=false;
    for (var i=0;i<line.length;i++) {
      var c=line[i];
      if (c==='"') { inQ=!inQ; }
      else if (c===","&&!inQ) { cols.push(cur.trim()); cur=""; }
      else { cur+=c; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  });
  return rows;
}

function render(csv) {
  try {
    var rows = parseCSV(csv);
    var D = {}; var periods = [];
    rows.forEach(function(row) {
      var key=(row[0]||"").trim();
      if (!key) return;
      if (key==="from") {
        periods.push({ from:(row[1]||"").trim(), to:(row[2]||"").trim(), profit:addPlus(row[3]||""), rate:addPlus(row[4]||"") });
      } else { D[key]=(row[1]||"").trim(); }
    });

    var first=periods.length?periods[0].from:"";
    var last=periods.length?periods[periods.length-1].to:"";
    var twr=addPlus(D.twr||"");
    var ann=String(D.annualized||"");

    setText("d-date","截至 "+(D.reportDate||""));
    setText("d-twr",twr+"%"); document.getElementById("d-twr").style.color=numColor(twr);
    setText("d-twr-sub",first+" — "+(D.reportDate||""));
    setText("d-ann",ann+"%");
    setText("d-profit","$"+(D.totalProfit||""));
    setText("d-balance","$"+(D.endBalance||""));
    setText("d-bal-date",D.reportDate||"");
    setText("d-footer-date",D.reportDate||"");
    setText("s-days",(D.totalDays||"")+" 天");
    setText("s-init","$"+(D.initialCapital||""));
    setText("s-add","$"+(D.addedCapital||""));
    setText("s-total","$"+(D.totalCapital||""));
    setText("s-balance","$"+(D.endBalance||""));
    setText("s-profit","$"+(D.totalProfit||""));
    setText("s-twr",twr+"%"); document.getElementById("s-twr").style.color=numColor(twr);
    setText("s-ann",ann+"%");
    document.getElementById("s-end-label").textContent="期末總資金（"+(D.reportDate||"")+"）";

    var tbody=document.getElementById("periods-body");
    tbody.innerHTML="";
    periods.forEach(function(p) {
      var tr=document.createElement("tr");
      tr.innerHTML='<td><div class="period-date">'+p.from+'<br>— '+p.to+'</div></td>'+
        '<td><span class="period-num" style="color:'+numColor(p.profit)+'">'+p.profit+'</span></td>'+
        '<td><span class="period-num" style="color:'+numColor(p.rate)+'">'+p.rate+'%</span></td>';
      tbody.appendChild(tr);
    });

    var totTr=document.createElement("tr"); totTr.className="total-row";
    totTr.innerHTML='<td><span class="total-label">'+first+' — '+last+'（合計）</span></td>'+
      '<td><span class="total-label">—</span></td>'+
      '<td><span class="total-rate" style="color:'+numColor(twr)+'">'+twr+'%</span></td>';
    tbody.appendChild(totTr);

    document.getElementById("loading").style.display="none";
    document.getElementById("main").style.display="block";
  } catch(e) {
    document.getElementById("loading").style.display="none";
    document.getElementById("error-msg").textContent="資料解析失敗："+e.message;
    document.getElementById("error-box").style.display="block";
  }
}

// 用 XMLHttpRequest 取代 fetch，避免某些瀏覽器的限制
function loadData() {
  document.getElementById("loading").style.display="block";
  document.getElementById("main").style.display="none";
  document.getElementById("error-box").style.display="none";

  var xhr = new XMLHttpRequest();
  xhr.open("GET", WORKER_URL+"?t="+Date.now(), true);
  xhr.timeout = 15000;

  xhr.onload = function() {
    if (xhr.status === 200) {
      render(xhr.responseText);
    } else {
      document.getElementById("loading").style.display="none";
      document.getElementById("error-msg").textContent="載入失敗：HTTP "+xhr.status;
      document.getElementById("error-box").style.display="block";
    }
  };

  xhr.onerror = function() {
    document.getElementById("loading").style.display="none";
    document.getElementById("error-msg").textContent="網路錯誤，請確認網路連線";
    document.getElementById("error-box").style.display="block";
  };

  xhr.ontimeout = function() {
    document.getElementById("loading").style.display="none";
    document.getElementById("error-msg").textContent="載入逾時，請重試";
    document.getElementById("error-box").style.display="block";
  };

  xhr.send();
}

loadData();
</script>

</body>
</html>
