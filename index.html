<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F7F5F0; color: #1A1A1A; font-family: 'Noto Serif TC', serif; min-height: 100vh; }

button {

.sl { flex:1; height:1px; background:linear-gradient(90deg,#C8C0B4,transparent); }
table { width:100%; border-collapse:collapse; background:#fff; border:1px solid #E0D8CE; }
th { padding:12px 18px; text-align:left; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.16em; color:#888; font-weight:400; border-bottom:1px solid #E8E2D8; text-transform:uppercase; background:#F9F7F3; }
td { padding:15px 18px; border-bottom:1px solid #EDE8E0; font-size:14px; color:#1A1A1A; }
tr:last-child td { border-bottom:none; }

var h = React.createElement;
var useState = React.useState;

var STORAGE_KEY = “inv_report_v3”;
var ADMIN_PIN = “0000”;
// 台股慣例：紅色=漲=正數，綠色=跌=負數
var COLOR_POS = “#C00000”;
var COLOR_NEG = “#007A40”;
var COLOR_GOLD = “#9A7A3A”;

function loadData() {
try { var r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
return null;
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }

var DEFAULT = {
reportDate: “2026/04/05”, totalDays: “126”,
initialCapital: “2,000,000”, addedCapital: “3,200,000”,
totalCapital: “5,200,000”, endBalance: “7,027,571”,
totalProfit: “1,827,571”, twr: “+54.05”, annualized: “約 156”,
periods: [
{ from: “2025/12/01”, to: “2026/01/04”, profit: “+544,814”, rate: “+29.40” },
{ from: “2026/01/06”, to: “2026/02/05”, profit: “+856,380”, rate: “+14.91” },
{ from: “2026/02/06”, to: “2026/03/05”, profit: “+886,099”, rate: “+13.42” },
{ from: “2026/03/06”, to: “2026/04/05”, profit: “-459,722”, rate: “-6.14” },
]
};

function isPos(v) { return String(v).trim().charAt(0) !== “-”; }
function numColor(v) { return isPos(v) ? COLOR_POS : COLOR_NEG; }

function ColorVal(props) {
return h(“span”, { style: { color: numColor(props.val), fontWeight: 600 } }, props.val + (props.suffix || “”));
}

function SH(props) {
return h(“div”, { className: “sh” }, h(“h2”, null, props.title), h(“div”, { className: “sl” }));
}

return h(“div”, { className:“container” },

// ── PIN GATE ─────────────────────────────────────────────────────────────
function PinGate(props) {
var state = useState(””);
var pin = state[0]; var setPin = state[1];
var errState = useState(false);
var err = errState[0]; var setErr = errState[1];

function check() {
if (pin === ADMIN_PIN) { props.onSuccess(); }
else { setErr(true); setPin(””); setTimeout(function(){ setErr(false); }, 1200); }
}

return h(“div”, { style:{ maxWidth:300, margin:“120px auto”, padding:32, background:”#fff”, border:“1px solid #E0D8CE”, textAlign:“center”, borderRadius:4 } },
h(“div”, { className:“serif”, style:{ fontSize:22, marginBottom:6 } }, “管理員登入”),
h(“div”, { className:“mono”, style:{ fontSize:11, color:”#999”, marginBottom:24 } }, “請輸入密碼”),
h(“input”, { type:“password”, value:pin, autoFocus:true,
onChange:function(ev){ setPin(ev.target.value); },
onKeyDown:function(ev){ if(ev.key===“Enter”) check(); },
placeholder:”••••”,
style:{ textAlign:“center”, fontSize:20, letterSpacing:“0.3em”, border: err?“1px solid #C04040”:undefined }
}),
err && h(“div”, { style:{ color:”#C04040”, fontSize:12, marginTop:8 } }, “密碼錯誤”),
h(“div”, { style:{ display:“flex”, gap:10, marginTop:16 } },
h(“button”, { className:“btn-gold”, style:{ flex:1 }, onClick:check }, “確認”),
h(“button”, { className:“btn-ghost”, onClick:props.onCancel }, “取消”)
),
h(“div”, { className:“mono”, style:{ fontSize:10, color:”#BBB”, marginTop:16 } }, “預設密碼：0000”)
);
}

// ── ADMIN VIEW ────────────────────────────────────────────────────────────
function AdminView(props) {
var formState = useState(JSON.parse(JSON.stringify(props.data)));
var form = formState[0]; var setForm = formState[1];
var savedState = useState(false);
var saved = savedState[0]; var setSaved = savedState[1];

function setField(key, val) { setForm(function(f){ var n=Object.assign({},f); n[key]=val; return n; }); }
function setPeriod(i, key, val) {
setForm(function(f){
var ps = f.periods.map(function(p,idx){ return idx===i ? Object.assign({},p,{[key]:val}) : p; });
return Object.assign({},f,{periods:ps});
});
}
function addPeriod() {
setForm(function(f){ return Object.assign({},f,{periods:f.periods.concat([{from:””,to:””,profit:””,rate:””}])}); });
}
function removePeriod(i) {
setForm(function(f){ return Object.assign({},f,{periods:f.periods.filter(function(_,idx){ return idx!==i; })}); });
}
function handleSave() { props.onSave(form); setSaved(true); setTimeout(function(){ setSaved(false); }, 2000); }

function Field(fp) {
return h(“div”, { style:{ marginBottom:16 } },
h(“label”, { className:“mono”, style:{ display:“block”, fontSize:10, color:”#888”, letterSpacing:“0.1em”, textTransform:“uppercase”, marginBottom:6 } }, fp.label),
h(“input”, { value:form[fp.fkey], placeholder:fp.placeholder, onChange:function(ev){ setField(fp.fkey, ev.target.value); } })
);
}

function Sec(sp) {
return h(“div”, { style:{ marginBottom:32 } },
h(“div”, { style:{ display:“flex”, alignItems:“center”, gap:14, marginBottom:18 } },
h(“h3”, { className:“serif”, style:{ fontSize:18, fontWeight:600, whiteSpace:“nowrap” } }, sp.title),
h(“div”, { style:{ flex:1, height:1, background:“linear-gradient(90deg,#D8D0C4,transparent)” } })
),
sp.children
);
}

var periodFields = [“from:開始日期:2025/12/01”,“to:結束日期:2026/01/04”,“profit:該段獲利（含正負號）:+544,814”,“rate:報酬率（不含 %）:+29.40”];

return h(“div”, { className:“container”, style:{ paddingTop:40 } },

h(“h2”, { className:“serif”, style:{ fontSize:28, fontWeight:600 } }, “更新報告數據”)
),
h(“button”, { className:“btn-ghost”, onClick:props.onCancel }, “← 返回”)
),

      )
    );
  }),
  h("button", { className:"btn-ghost", style:{ width:"100%", marginTop:4 }, onClick:addPeriod }, "＋ 新增一期")
)}),

h("div", { style:{ display:"flex", gap:12 } },
  h("button", { className:"btn-gold", style:{ flex:1 }, onClick:handleSave }, saved ? "✓ 已儲存！" : "儲存並更新報告"),
  h("button", { className:"btn-ghost", onClick:props.onCancel }, "取消")
),
h("p", { className:"mono", style:{ fontSize:11, color:"#AAA", marginTop:12, textAlign:"center" } }, "儲存後客戶刷新頁面即可看到最新數據")

}

// ── ROOT ──────────────────────────────────────────────────────────────────
function App() {
var dataState = useState(function(){ return loadData() || DEFAULT; });
var data = dataState[0]; var setData = dataState[1];
var modeState = useState(“client”);
var mode = modeState[0]; var setMode = modeState[1];

function handleSave(d) { setData(d); saveData(d); setMode(“client”); }

if (mode === “client”) return h(ClientView, { data:data, onAdmin:function(){ setMode(“pin”); } });
if (mode === “pin”)    return h(PinGate, { onSuccess:function(){ setMode(“admin”); }, onCancel:function(){ setMode(“client”); } });
if (mode === “admin”)  return h(AdminView, { data:data, onSave:handleSave, onCancel:function(){ setMode(“client”); } });
return null;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(h(App, null));
</script>
